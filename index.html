    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indoor Navigation System</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Mobile Menu Toggle -->
        <button class="mobile-menu-toggle" id="mobileMenuToggle">
            <span></span>
            <span></span>
            <span></span>   
        </button>

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <button class="sidebar-close" id="sidebarClose">✕</button>
            <h1>Indoor Navigation</h1>

            <div class="controls">
                <div class="form-group">
                    <label for="startLocation">Start Location</label>
                    <div class="searchable-dropdown">
                        <input class="searchable-input" id="startLocation" type="text" placeholder="Type location...">
                        <ul class="dropdown-list hidden" id="startLocationList"></ul>
                    </div>
                </div>

                <div class="form-group">
                    <label for="destination">Destination</label>
                    <div class="searchable-dropdown">
                        <input class="searchable-input" id="destination" type="text" placeholder="Type location...">
                        <ul class="dropdown-list hidden" id="destinationList"></ul>
                    </div>
                </div>

                <button class="btn-primary" id="getDirections">Get Directions</button>
                <button class="btn-secondary" id="clearRoute">Clear Route</button>
            </div>

            
            <div class="view-controls">
                <h3>Map Views</h3>
                <button class="view-btn active" data-view="OV">Overall View</button>
                <button class="view-btn" data-view="mainjhs">Junior Highschool Building</button>
                <button class="view-btn" data-view="shsbldg">Senior Highschool Building</button>
                <button class="view-btn" data-view="subshs">Sub Senior Highschool Building</button>
                <button class="view-btn" data-view="preschool">Pre-School Building</button>
                <button class="view-btn" data-view="quadrangle">Quadrangle</button>
                <button class="view-btn" data-view="garage">Garage</button>
                <h3 style="margin-top: 18px;">Map Views (View Only)</h3>
                <!-- removed stray shs-building entry -->
                <button class="view-btn" data-view="court">Court</button>
                <button class="view-btn" data-view="shed">Shed</button>
                <button class="view-btn" data-view="mainent">Main Entrance</button>
                <button class="view-btn" data-view="shed">Waiting Shed</button>
                <button class="view-btn" data-view="OV">OV</button>
                
            </div>

            <div class="quick-access">
                <h3>Quick Access</h3>
                <button class="quick-btn" data-type="mentrance">Main Entrance</button>
                <button class="quick-btn" data-type="offices">Registrar / Principals Office</button>
                <button class="quick-btn" data-type="restrooms">Restrooms</button>
                <button class="quick-btn" data-type="emergency">Emergency Exits</button>
            </div>

            <div class="info-panel hidden" id="infoPanel">
                <h3>Information</h3>
                <div id="infoContent"></div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="toolbar">
                <button class="zoom-btn" id="zoomIn" title="Zoom In">+</button>
                <button class="zoom-btn" id="zoomOut" title="Zoom Out">−</button>
                <button class="zoom-btn" id="resetView" title="Reset View">Reset</button>
                <span class="zoom-level" id="zoomLevel">100%</span>

                <!-- Emergency Mode Toggle -->
                <button class="emergency-mode-btn" id="emergencyModeBtn" aria-pressed="false" title="Toggle Emergency Mode — activates emergency exit routes">
                    <span class="emergency-icon">🚨</span>
                    <span class="emergency-label">Emergency Mode</span>
                </button>

                <!-- Desktop-only controls (right side of toolbar) -->
                <button class="mobile-map-btn desktop-only" id="desktopMapSelect">Choose Map</button>
            </div>

            <!-- Emergency Mode Banner -->
            <div class="emergency-banner hidden" id="emergencyBanner" role="alert" aria-hidden="true">
                <span class="emergency-banner-icon">🚨</span>
                <span>Emergency Mode is <strong>ON</strong> — Routes now use emergency exits. Navigate to the nearest exit immediately.</span>
                <button class="emergency-banner-dismiss" onclick="document.getElementById('emergencyModeBtn').click()" aria-label="Deactivate Emergency Mode">✕ Deactivate</button>
            </div>

            <!-- Floor Selector -->
            <div class="floor-selector hidden" id="floorSelector">
                <label>Select Floor:</label>
                <div class="floor-buttons-container" id="floorButtonsContainer"></div>
            </div>  

            <div class="map-wrapper" id="mapWrapper">
                <!-- Floor navigation buttons (previous / next) -->
                <div class="floor-nav" id="floorNav" aria-hidden="false">
                    <button class="floor-nav-btn" id="prevFloorBtn" title="Previous Floor" aria-label="Previous Floor">◀</button>
                    <div class="floor-nav-label" id="floorNavLabel" aria-live="polite"></div>
                    <button class="floor-nav-btn" id="nextFloorBtn" title="Next Floor" aria-label="Next Floor">▶</button>
                </div>

                <!-- Directions-only floor nav: appears when a route spans multiple floors -->
                <div class="directions-floor-nav hidden" id="directionsFloorNav" aria-hidden="true">
                    <button class="dir-nav-btn" id="dirPrevBtn" title="Previous Step" aria-label="Previous Step">◀</button>
                    <div class="dir-floor-label" id="dirFloorLabel" aria-live="polite"></div>
                    <button class="dir-nav-btn" id="dirNextBtn" title="Next Step" aria-label="Next Step">▶</button>
                </div>
                <!-- Overall Campus View -->
                <svg class="floor-map active" id="OVMap" viewBox="0 0 1600 800" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
                            <feGaussianBlur in="SourceAlpha" stdDeviation="3"></feGaussianBlur>
                            <feOffset dx="2" dy="2" result="offsetblur"></feOffset>
                            <feComponentTransfer>
                                <feFuncA type="linear" slope="0.3"></feFuncA>
                            </feComponentTransfer>
                            <feMerge>
                                <feMergeNode></feMergeNode>
                                <feMergeNode in="SourceGraphic"></feMergeNode>
                            </feMerge>
                        </filter>

                            .location-label { fill: #37474f; font-size: 13px; font-weight: 600; text-anchor: middle; pointer-events: none; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
                            .level-label { fill: #263238; font-size: 18px; font-weight: 700; text-anchor: middle; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

                            .building-bg { fill: #f8f9fa; stroke: #495057; stroke-width: 2; filter: url(#shadow); }
                            .location-rect { fill: #e3f2fd; stroke: #1976d2; stroke-width: 1.5; cursor: pointer; transition: all 0.3s; rx: 4; }
                            .location-rect:hover { fill: #bbdefb; stroke: #1565c0; stroke-width: 2; }
                            .location-rect.start { fill: #66bb6a; stroke: #43a047; stroke-width: 3; }
                            .location-rect.destination { fill: #ef5350; stroke: #e53935; stroke-width: 3; }
                            .campus-bg { fill: #e8f5e9; }

                            
                            .campus-path { fill: #ffffff; stroke: #666; stroke-width: 2; cursor: pointer; transition: all 0.3s; }
                            .campus-path:hover { fill: #a0a0a0; stroke: #333; stroke-width: 2.5; }
                            .campus-path.start { fill: #66bb6a; stroke: #43a047; stroke-width: 3; }
                            .campus-path.destination { fill: #ef5350; stroke: #e53935; stroke-width: 3; }
                        </style>
                    </defs>
